<!-- 2. Librería JS de Quill (Para el texto enriquecido) -->
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.js"></script>

<!-- 3. Lógica global opcional (Solo se activa si detecta un editor en la página) -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const editorDiv = document.getElementById('editor-container');
        const textarea = document.getElementById('description');

        if (editorDiv && textarea) {
            // Inicializar Quill
            const quill = new Quill('#editor-container', {
                theme: 'snow',
                modules: {
                    toolbar: [
                        ['bold', 'italic', 'underline'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        ['clean']
                    ]
                }
            });

            // Cargar contenido inicial desde el textarea
            quill.root.innerHTML = textarea.value;

            // Sincronizar antes de enviar el formulario
            const form = textarea.closest('form');
            if (form) {
                form.addEventListener('submit', function() {
                    textarea.value = quill.root.innerHTML;
                });
            }
        }
    });
</script>
