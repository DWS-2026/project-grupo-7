{{> partials/header}}

<main class="container d-flex flex-column justify-content-center align-items-center flex-grow-1 py-5 text-center">
    <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 6rem;"></i>

    <h1 class="display-1 fw-bold text-dark mb-0 mt-3">400</h1>
    <h2 class="h3 text-muted mb-4">Bad Request</h2>

    <p class="lead mb-4 text-secondary" style="max-width: 600px;">
        The request could not be processed. The link might be misspelled, incorrectly formatted, or contain invalid
        characters for this path. </p>

    <div class="d-flex gap-3">
        <button onclick="window.history.back()" class="btn btn-outline-dark btn-lg px-4 rounded-pill">
            <i class="bi bi-arrow-left me-2"></i>Go Back
        </button>
        <a href="/" class="btn btn-purple btn-lg px-4 rounded-pill shadow-sm">
            <i class="bi bi-house-door me-2"></i>Return to Base
        </a>
    </div>
</main>

{{> partials/footer}}
