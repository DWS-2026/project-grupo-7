{{> partials/header}}

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold">User Management</h3>
                <a href="/admin" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-2"></i> Back to Dashboard
                </a>
            </div>

            <div class="card shadow-sm border-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">User</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {{#allUsers}}
                            <tr>
                                <td class="ps-4">
                                    <div class="fw-bold text-dark">{{firstName}} {{lastName}}</div>
                                </td>
                                <td>
                                    <span class="text-muted">{{email}}</span>
                                </td>
                                <td>
                                    {{#roles}}
                                        <span class="badge bg-secondary me-1">{{.}}</span>
                                    {{/roles}}
                                </td>
                                <td class="text-end pe-4">
                                    <a href="/admin/users/{{id}}" class="btn btn-sm btn-outline-primary me-1">
                                        <i class="bi bi-pencil"></i> Edit Profile
                                    </a>

                                    <form action="/admin/users/{{id}}/delete" method="POST" class="d-inline">
                                        <input type="hidden" name="_csrf" value="{{token}}" />
                                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Are you sure you want to delete user {{email}}?');">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            {{/allUsers}}

                            {{^allUsers}}
                            <tr>
                                <td colspan="4" class="text-center py-4 text-muted">
                                    No users found in the system.
                                </td>
                            </tr>
                            {{/allUsers}}
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</main>

{{> partials/footer}}
