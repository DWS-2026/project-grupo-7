{{> header}}

<div class="container d-flex flex-column justify-content-center flex-grow-1 py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 col-xl-5">
            
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-5">
                    
                    <div class="text-center mb-4">
                        <div class="bg-purple-light rounded-circle d-inline-flex p-3 mb-3">
                            <i class="bi bi-person-circle text-purple h2 mb-0"></i>
                        </div>
                        <h3 class="fw-bold">Welcome Back</h3>
                        <p class="text-muted small">Enter your credentials to access your courses.</p>
                    </div>

                    {{#error}}
                    <div class="alert alert-danger text-center small mb-4" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>Invalid username or password.
                    </div>
                    {{/error}}

                    {{#logout}}
                    <div class="alert alert-success text-center small mb-4" role="alert">
                        <i class="bi bi-check-circle-fill me-2"></i>You have been logged out successfully.
                    </div>
                    {{/logout}}

                    <form action="/login" method="POST">
                        
                        <input type="hidden" name="_csrf" value="{{token}}"/>

                        <div class="form-floating mb-3">
                            <input type="email" name="username" class="form-control" id="floatingInput" placeholder="name@example.com" required>
                            <label for="floatingInput">Email address</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" name="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                            <label for="floatingPassword">Password</label>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="remember-me" id="rememberMe">
                                <label class="form-check-label small" for="rememberMe">Remember me</label>
                            </div>
                            <a href="/forgot-password" class="small text-purple text-decoration-none fw-bold">Forgot password?</a>
                        </div>

                        <button type="submit" class="btn btn-purple w-100 py-2 fs-5 rounded-3 mb-3 text-center d-block">Log In</button>
                    </form>
                </div>
            </div>

            <div class="text-center mt-4">
                <p class="text-muted">Don't have an account? 
                    <a href="/register" class="text-purple fw-bold text-decoration-none">Register</a>
                </p>
            </div>

        </div>
    </div>
</div>

{{> footer}}
